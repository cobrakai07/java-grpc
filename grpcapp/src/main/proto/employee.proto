syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.generatedClass";
option java_outer_classname= "EmployeeProto";

import "google/protobuf/timestamp.proto";

package com.generatedClasses;

message Employee{
  int32 id=1;//field tags (unique numbers)
  string name =2;//proto will not use field name, it will use field tags
  double salary = 3;// which makes serialization and deserialization process faster than json
  repeated Department departments = 4;
  map<string, string> addressMap=5;
  bool isActive = 6;
  bytes profilePicture = 7;
  google.protobuf.Timestamp joinDate=8;
}

message Department{
  int32 id=1;
  string name =2;
}

message EmployeeRequestDTOById{
  int32 id=1;
}

message EmployeeListResponse{
  repeated Employee employees=1;
}

message NoParamsDTO{
  // we must pass parameters even if services are empty in request
}

service EmployeeService{
  rpc getEmployeeById(EmployeeRequestDTOById) returns (Employee);
  rpc addEmployee(Employee) returns (Employee);
  rpc getAllEmployee(NoParamsDTO) returns (EmployeeListResponse);
}


